name: Build & Deploy Wiki

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for MineClonia updates
        id: check
        run: |
          # TODO: 实现版本检测逻辑
          echo "has_update=true" >> $GITHUB_OUTPUT
          echo "version=latest" >> $GITHUB_OUTPUT

      - name: Pull latest MineClonia source
        if: steps.check.outputs.has_update == 'true'
        run: |
          # TODO: 拉取最新源码
          echo "Pulling latest source..."

      - name: Run Lua parser
        if: steps.check.outputs.has_update == 'true'
        run: |
          # TODO: 运行 Lua 解析脚本生成 wiki 数据
          echo "Generating wiki data from source..."

      - name: Build VitePress
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: wiki/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
